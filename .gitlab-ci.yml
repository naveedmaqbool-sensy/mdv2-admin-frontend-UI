image: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/docker:20-git

stages:
  - security
  - plan
  - build
  - deploy
  - notification

variables:
  # 高速化
  FF_USE_FASTZIP: 'true'
  ARTIFACT_COMPRESSION_LEVEL: 'fast'
  CACHE_COMPRESSION_LEVEL: 'fast'
  # ランナー -------------------------------------------
  SECURITY_RUNNER: clsl-dev
  BUILD_RUNNER: clsl-dev
  DEPLOY_RUNNER: clsl-dev
  # ｊｈ様本番環境 -------------------------------------------
  PRODUCTION_JH_GCLOUD_AUTH_CODE: 
  PRODUCTION_JH_GCLOUD_PROJECT: sensy-md-joyfulhonda
  PRODUCTION_JH_ARTIFACT_REGISTRY_REGION: asia-northeast1
  PRODUCTION_JH_ARTIFACT_REGISTRY_REPOSITORY: ${PRODUCTION_JH_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/sensy-md-joyfulhonda/frontend/admin
  PRODUCTION_JH_CLOUD_RUN_SERVICE_NAME: admin
  # イズミ様本番環境 -------------------------------------------
  PRODUCTION_IZUMI_GCLOUD_AUTH_CODE: 
  PRODUCTION_IZUMI_GCLOUD_PROJECT: sensy-md-izumi
  PRODUCTION_IZUMI_ARTIFACT_REGISTRY_REGION: asia-northeast1
  PRODUCTION_IZUMI_ARTIFACT_REGISTRY_REPOSITORY: ${PRODUCTION_IZUMI_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/sensy-md-izumi/frontend/admin
  PRODUCTION_IZUMI_CLOUD_RUN_SERVICE_NAME: admin

# ＣＩの共通処理を読み込み（案件グループ内の private レポジトリを参照）
include:
  - project: infrastructure-templates/gitlab-ci
    file:
      - .notification/.gitlab-ci.yml
      - .security/.gitlab-ci.yml
      - .clsl-develop-server/.gitlab-ci.yml
      - .gcp/.gitlab-ci.yml

# security -----------------------------------------------------------------------------------------------
.security_rules: &security_rules
  rules:
    # - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && ($CI_PIPELINE_SOURCE == "schedule")
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix\/*/ # hotfix からのマージリクエストは常に実行
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop" # develop ブランチへのマージリクエストは常に実行

# audit
.yarn-audit:
  extends: .security-yarn-audit
  tags: [$SECURITY_RUNNER]
  <<: *security_rules
  variables:
    NODE_IMAGE_VERSION: iron-alpine

# audit の通知
.audit-notification:
  extends: .notification-send
  <<: *security_rules
  tags: [$SECURITY_RUNNER]
  when: on_failure
  variables:
    MENTION: '${CI_COMMIT_AUTHOR}'
    BODY: "##### [${CI_PROJECT_NAME}](${CI_PROJECT_URL}) パッケージのセキュリティ情報が更新されました。\n[ここをクリック](${FAILURE_JOB_URL})して内容を確認してください"
  needs:
    - yarn-audit
  dependencies:
    - yarn-audit

# 開発環境 ------------------------------------------------------------------------------------------------
develop_plan:
  only: [develop]
  stage: plan
  trigger:
    include: .gitlab-ci/develop.yml
    strategy: depend

# 検証環境（コアソフトＧＣＰ） ------------------------------------------------------
staging_joyfullhonda_plan:
  only: [staging]
  stage: plan
  trigger:
    include: .gitlab-ci/staging-jh.yml
    strategy: depend
staging_mitsubishi_plan:
  only: [staging]
  stage: plan
  trigger:
    include: .gitlab-ci/staging-mitsubishi.yml
    strategy: depend

# ＪＨ様本番環境（ＧＣＰ） ------------------------------------------------------
# デプロイ用起動条件
.production_jh_deploy_rules: &production_jh_deploy_rules
  only: [main]

# docker build
production-jh-docker-build:
  extends: .gcp-artifact-registry-build-and-push
  tags: [$BUILD_RUNNER]
  <<: *production_jh_deploy_rules
  variables:
    ENVIRONMENT: production-jh
    GCLOUD_AUTH_CODE: ${PRODUCTION_JH_GCLOUD_AUTH_CODE}
    GCLOUD_PROJECT: ${PRODUCTION_JH_GCLOUD_PROJECT}
    REGION: ${PRODUCTION_JH_ARTIFACT_REGISTRY_REGION}
    IMAGE_NAME: ${PRODUCTION_JH_ARTIFACT_REGISTRY_REPOSITORY}

# ビルド通知
production-jh-docker-build-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  when: on_failure
  <<: *production_jh_deploy_rules
  variables:
    BODY: '##### [${CI_PROJECT_NAME}] docker image のビルド / プッシュに失敗しました'
  needs:
    - production-jh-docker-build
  dependencies:
    - production-jh-docker-build

# cloud run service デプロイ
production-jh-cloud-run-service-deploy:
  extends: .gcp-cloud-run-service-deploy
  tags: [$BUILD_RUNNER]
  <<: *production_jh_deploy_rules
  variables:
    GCLOUD_AUTH_CODE: ${PRODUCTION_JH_GCLOUD_AUTH_CODE}
    GCLOUD_PROJECT: ${PRODUCTION_JH_GCLOUD_PROJECT}
    REGION: ${PRODUCTION_JH_ARTIFACT_REGISTRY_REGION}
    IMAGE_NAME: ${PRODUCTION_JH_ARTIFACT_REGISTRY_REPOSITORY}
    CLOUD_RUN_SERVICE_NAME: ${PRODUCTION_JH_CLOUD_RUN_SERVICE_NAME}

# デプロイ通知
production-jh-cloud-run-service-deploy-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  when: on_failure
  <<: *production_jh_deploy_rules
  variables:
    BODY: '##### [${CI_PROJECT_NAME}] デプロイに失敗しました'
  needs:
    - production-jh-cloud-run-service-deploy
  dependencies:
    - production-jh-cloud-run-service-deploy

# イズミ様本番環境（ＧＣＰ） ------------------------------------------------------
# デプロイ用起動条件
.production_izumi_deploy_rules: &production_izumi_deploy_rules
  only: [feature/izumi-ci]

# docker build
production-izumi-docker-build:
  extends: .gcp-artifact-registry-build-and-push
  tags: [$BUILD_RUNNER]
  <<: *production_izumi_deploy_rules
  variables:
    ENVIRONMENT: production-izumi
    GCLOUD_AUTH_CODE: ${PRODUCTION_IZUMI_GCLOUD_AUTH_CODE}
    GCLOUD_PROJECT: ${PRODUCTION_IZUMI_GCLOUD_PROJECT}
    REGION: ${PRODUCTION_IZUMI_ARTIFACT_REGISTRY_REGION}
    IMAGE_NAME: ${PRODUCTION_IZUMI_ARTIFACT_REGISTRY_REPOSITORY}

# ビルド通知
production-izumi-docker-build-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  when: on_failure
  <<: *production_izumi_deploy_rules
  variables:
    BODY: '##### [${CI_PROJECT_NAME}] docker image のビルド / プッシュに失敗しました'
  needs:
    - production-izumi-docker-build
  dependencies:
    - production-izumi-docker-build

# cloud run service デプロイ
production-izumi-cloud-run-service-deploy:
  extends: .gcp-cloud-run-service-deploy
  tags: [$BUILD_RUNNER]
  <<: *production_izumi_deploy_rules
  variables:
    GCLOUD_AUTH_CODE: ${PRODUCTION_IZUMI_GCLOUD_AUTH_CODE}
    GCLOUD_PROJECT: ${PRODUCTION_IZUMI_GCLOUD_PROJECT}
    REGION: ${PRODUCTION_IZUMI_ARTIFACT_REGISTRY_REGION}
    IMAGE_NAME: ${PRODUCTION_IZUMI_ARTIFACT_REGISTRY_REPOSITORY}
    CLOUD_RUN_SERVICE_NAME: ${PRODUCTION_IZUMI_CLOUD_RUN_SERVICE_NAME}

# デプロイ通知
production-izumi-cloud-run-service-deploy-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  when: on_failure
  <<: *production_izumi_deploy_rules
  variables:
    BODY: '##### [${CI_PROJECT_NAME}] デプロイに失敗しました'
  needs:
    - production-izumi-cloud-run-service-deploy
  dependencies:
    - production-izumi-cloud-run-service-deploy
