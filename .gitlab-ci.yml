image: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/docker:20-git

stages:
  - security
  - plan
  - build
  - deploy
  - notification

variables:
  # 高速化
  FF_USE_FASTZIP: 'true'
  ARTIFACT_COMPRESSION_LEVEL: 'fast'
  CACHE_COMPRESSION_LEVEL: 'fast'
  # ランナー -------------------------------------------
  SECURITY_RUNNER: clsl-dev
  BUILD_RUNNER: clsl-dev
  DEPLOY_RUNNER: clsl-dev

# ＣＩの共通処理を読み込み（案件グループ内の private レポジトリを参照）
include:
  - project: infrastructure-templates/gitlab-ci
    file:
      - .notification/.gitlab-ci.yml
      - .security/.gitlab-ci.yml
      - .clsl-develop-server/.gitlab-ci.yml
      - .gcp/.gitlab-ci.yml

# security -----------------------------------------------------------------------------------------------
.security_rules: &security_rules
  rules:
    # - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && ($CI_PIPELINE_SOURCE == "schedule")
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix\/*/ # hotfix からのマージリクエストは常に実行
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop" # develop ブランチへのマージリクエストは常に実行

# audit
.yarn-audit:
  extends: .security-yarn-audit
  tags: [$SECURITY_RUNNER]
  <<: *security_rules
  variables:
    NODE_IMAGE_VERSION: iron-alpine

# audit の通知
.audit-notification:
  extends: .notification-send
  <<: *security_rules
  tags: [$SECURITY_RUNNER]
  when: on_failure
  variables:
    MENTION: '${CI_COMMIT_AUTHOR}'
    BODY: "##### [${CI_PROJECT_NAME}](${CI_PROJECT_URL}) パッケージのセキュリティ情報が更新されました。\n[ここをクリック](${FAILURE_JOB_URL})して内容を確認してください"
  needs:
    - yarn-audit
  dependencies:
    - yarn-audit

# 開発環境 ------------------------------------------------------------------------------------------------
develop_plan:
  only: [develop]
  stage: plan
  trigger:
    include: .gitlab-ci/develop.yml
    strategy: depend

# 検証環境（コアソフトＧＣＰ） ------------------------------------------------------
staging_joyfullhonda_plan:
  only: [staging]
  stage: plan
  trigger:
    include: .gitlab-ci/staging-jh.yml
    strategy: depend
staging_mitsubishi_plan:
  only: [staging]
  stage: plan
  trigger:
    include: .gitlab-ci/staging-mitsubishi.yml
    strategy: depend

# 本番環境 -------------------------------------------------------
production_joyfullhonda_plan:
  only: [main]
  stage: plan
  trigger:
    include: .gitlab-ci/production-jh.yml
    strategy: depend
production_izumi_plan:
  only: [feature/izumi-ci]
  stage: plan
  trigger:
    include: .gitlab-ci/production-izumi.yml
    strategy: depend
production_mitsubishi_plan:
  only: [feature/mitsubishi-ci]
  stage: plan
  trigger:
    include: .gitlab-ci/production-mitsubishi.yml
    strategy: depend
