image: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/docker:20-git

stages:
  - security
  - build
  - deploy
  - notification

variables:
  # 高速化
  FF_USE_FASTZIP: 'true'
  ARTIFACT_COMPRESSION_LEVEL: 'fast'
  CACHE_COMPRESSION_LEVEL: 'fast'
  # ランナー -------------------------------------------
  SECURITY_RUNNER: clsl-dev
  BUILD_RUNNER: clsl-dev
  DEPLOY_RUNNER: clsl-dev
  # 開発環境 -------------------------------------------
  DEVELOP_NODE_IMAGE: $CI_REGISTRY_IMAGE
  # 検証環境 -----------------------------------------------------
  STAGING_GCLOUD_AUTH_CODE: 
  STAGING_GCLOUD_PROJECT: sensy-develop
  STAGING_ARTIFACT_REGISTRY_REGION: asia-northeast1
  STAGING_ARTIFACT_REGISTRY_REPOSITORY: ${STAGING_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/sensy-develop/frontend/admin
  STAGING_CLOUD_RUN_SERVICE_NAME: admin-frontend
  # ｊｈ様本番環境 -------------------------------------------
  PRODUCTION_JH_GCLOUD_AUTH_CODE: 
  PRODUCTION_JH_GCLOUD_PROJECT: sensy-md-joyfulhonda
  PRODUCTION_JH_ARTIFACT_REGISTRY_REGION: asia-northeast1
  PRODUCTION_JH_ARTIFACT_REGISTRY_REPOSITORY: ${PRODUCTION_JH_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/sensy-md-joyfulhonda/frontend/admin
  PRODUCTION_JH_CLOUD_RUN_SERVICE_NAME: admin

# ＣＩの共通処理を読み込み（案件グループ内の private レポジトリを参照）
include:
  - project: infrastructure-templates/gitlab-ci
    file:
      - .notification/.gitlab-ci.yml
      - .security/.gitlab-ci.yml
      - .clsl-develop-server/.gitlab-ci.yml
      - .gcp/.gitlab-ci.yml

# security -----------------------------------------------------------------------------------------------
.security_rules: &security_rules
  rules:
    # - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && ($CI_PIPELINE_SOURCE == "schedule")
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix\/*/ # hotfix からのマージリクエストは常に実行
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop" # develop ブランチへのマージリクエストは常に実行

# audit
.yarn-audit:
  extends: .security-yarn-audit
  tags: [$SECURITY_RUNNER]
  <<: *security_rules
  variables:
    NODE_IMAGE_VERSION: iron-alpine

# audit の通知
.audit-notification:
  extends: .notification-send
  <<: *security_rules
  tags: [$SECURITY_RUNNER]
  when: on_failure
  variables:
    MENTION: '${CI_COMMIT_AUTHOR}'
    BODY: "##### [${CI_PROJECT_NAME}](${CI_PROJECT_URL}) パッケージのセキュリティ情報が更新されました。\n[ここをクリック](${FAILURE_JOB_URL})して内容を確認してください"
  needs:
    - yarn-audit
  dependencies:
    - yarn-audit

# 開発環境 ------------------------------------------------------------------------------------------------
.develop_deploy_rules: &develop_deploy_rules
  rules:
    - if: $CI_COMMIT_BRANCH == "develop" && ($CI_PIPELINE_SOURCE != "schedule")

# ビルド
develop-build:
  extends: .clsl-develop-server-build
  tags: [$BUILD_RUNNER]
  <<: *develop_deploy_rules
  variables:
    ENVIRONMENT: develop
    IMAGE_NAME: ${DEVELOP_NODE_IMAGE}

# ビルド失敗通知
develop-build-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  when: on_failure
  <<: *develop_deploy_rules
  variables:
    MENTION: $CI_COMMIT_AUTHOR
    BODY: '##### [${CI_PROJECT_NAME}](${CI_PROJECT_URL}) ビルドに失敗しました'
  needs:
    - develop-build
  dependencies:
    - develop-build

# デプロイ
develop-deploy:
  extends: .clsl-develop-server-deploy-nuxt
  tags: [aws-dev01]
  <<: *develop_deploy_rules
  variables:
    IMAGE_NAME: ${DEVELOP_NODE_IMAGE}

# デプロイ失敗通知
develop-deploy-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  when: on_failure
  <<: *develop_deploy_rules
  variables:
    MENTION: $CI_COMMIT_AUTHOR
    BODY: '##### [${CI_PROJECT_NAME}](${CI_PROJECT_URL}) デプロイに失敗しました'
  needs:
    - develop-deploy
  dependencies:
    - develop-deploy

yarn-install-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  variables:
    BODY: "##### 【管理サイト】パッケージに更新がはいりました。\n##### ${CI_COMMIT_BRANCH} ブランチを取り込んだら、各自 `yarn install` の実行をお願いします。"
    FAILED_BODY: ''
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - package.json

# 検証環境（コアソフトＧＣＰ） ------------------------------------------------------
# デプロイ用起動条件
.staging_deploy_rules: &staging_deploy_rules
  only: [staging]

# docker build
staging-docker-build:
  extends: .gcp-artifact-registry-build-and-push
  tags: [$BUILD_RUNNER]
  <<: *staging_deploy_rules
  variables:
    ENVIRONMENT: staging
    GCLOUD_AUTH_CODE: ${STAGING_GCLOUD_AUTH_CODE}
    GCLOUD_PROJECT: ${STAGING_GCLOUD_PROJECT}
    REGION: ${STAGING_ARTIFACT_REGISTRY_REGION}
    IMAGE_NAME: ${STAGING_ARTIFACT_REGISTRY_REPOSITORY}

# ビルド通知
staging-docker-build-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  when: on_failure
  <<: *staging_deploy_rules
  variables:
    BODY: '##### [${CI_PROJECT_NAME}] docker image のビルド / プッシュに失敗しました'
  needs:
    - staging-docker-build
  dependencies:
    - staging-docker-build

# cloud run service デプロイ
staging-cloud-run-service-deploy:
  extends: .gcp-cloud-run-service-deploy
  tags: [$BUILD_RUNNER]
  <<: *staging_deploy_rules
  variables:
    GCLOUD_AUTH_CODE: ${STAGING_GCLOUD_AUTH_CODE}
    GCLOUD_PROJECT: ${STAGING_GCLOUD_PROJECT}
    REGION: ${STAGING_ARTIFACT_REGISTRY_REGION}
    IMAGE_NAME: ${STAGING_ARTIFACT_REGISTRY_REPOSITORY}
    CLOUD_RUN_SERVICE_NAME: ${STAGING_CLOUD_RUN_SERVICE_NAME}

# デプロイ通知
staging-cloud-run-service-deploy-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  when: on_failure
  <<: *staging_deploy_rules
  variables:
    BODY: '##### [${CI_PROJECT_NAME}] デプロイに失敗しました'
  needs:
    - staging-cloud-run-service-deploy
  dependencies:
    - staging-cloud-run-service-deploy

# ＪＨ様本番環境（ＧＣＰ） ------------------------------------------------------
# デプロイ用起動条件
.production_jh_deploy_rules: &production_jh_deploy_rules
  only: [main]

# docker build
production-jh-docker-build:
  extends: .gcp-artifact-registry-build-and-push
  tags: [$BUILD_RUNNER]
  <<: *production_jh_deploy_rules
  variables:
    ENVIRONMENT: production-jh
    GCLOUD_AUTH_CODE: ${PRODUCTION_JH_GCLOUD_AUTH_CODE}
    GCLOUD_PROJECT: ${PRODUCTION_JH_GCLOUD_PROJECT}
    REGION: ${PRODUCTION_JH_ARTIFACT_REGISTRY_REGION}
    IMAGE_NAME: ${PRODUCTION_JH_ARTIFACT_REGISTRY_REPOSITORY}

# ビルド通知
production-jh-docker-build-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  when: on_failure
  <<: *production_jh_deploy_rules
  variables:
    BODY: '##### [${CI_PROJECT_NAME}] docker image のビルド / プッシュに失敗しました'
  needs:
    - production-jh-docker-build
  dependencies:
    - production-jh-docker-build

# cloud run service デプロイ
production-jh-cloud-run-service-deploy:
  extends: .gcp-cloud-run-service-deploy
  tags: [$BUILD_RUNNER]
  <<: *production_jh_deploy_rules
  variables:
    GCLOUD_AUTH_CODE: ${PRODUCTION_JH_GCLOUD_AUTH_CODE}
    GCLOUD_PROJECT: ${PRODUCTION_JH_GCLOUD_PROJECT}
    REGION: ${PRODUCTION_JH_ARTIFACT_REGISTRY_REGION}
    IMAGE_NAME: ${PRODUCTION_JH_ARTIFACT_REGISTRY_REPOSITORY}
    CLOUD_RUN_SERVICE_NAME: ${PRODUCTION_JH_CLOUD_RUN_SERVICE_NAME}

# デプロイ通知
production-jh-cloud-run-service-deploy-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  when: on_failure
  <<: *production_jh_deploy_rules
  variables:
    BODY: '##### [${CI_PROJECT_NAME}] デプロイに失敗しました'
  needs:
    - production-jh-cloud-run-service-deploy
  dependencies:
    - production-jh-cloud-run-service-deploy
