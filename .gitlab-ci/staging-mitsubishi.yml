stages:
  - build
  - deploy
  - notification

variables:
  STAGING_GCLOUD_AUTH_CODE: 
  STAGING_GCLOUD_PROJECT: sensy-develop
  STAGING_ARTIFACT_REGISTRY_REGION: asia-northeast1
  STAGING_ARTIFACT_REGISTRY_REPOSITORY: ${STAGING_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/sensy-develop/frontend/admin-mitsubishi
  STAGING_CLOUD_RUN_SERVICE_NAME: admin-frontend-f815564f1fb658fbc1d8df4eb059ea77

# ＣＩの共通処理を読み込み（案件グループ内の private レポジトリを参照）
include:
  - project: infrastructure-templates/gitlab-ci
    file:
      - .notification/.gitlab-ci.yml
      - .gcp/.gitlab-ci.yml

# docker build
staging-docker-build:
  extends: .gcp-artifact-registry-build-and-push
  tags: [$BUILD_RUNNER]
  variables:
    ENVIRONMENT: staging-jh
    GCLOUD_AUTH_CODE: ${STAGING_GCLOUD_AUTH_CODE}
    GCLOUD_PROJECT: ${STAGING_GCLOUD_PROJECT}
    REGION: ${STAGING_ARTIFACT_REGISTRY_REGION}
    IMAGE_NAME: ${STAGING_ARTIFACT_REGISTRY_REPOSITORY}

# ビルド通知
staging-docker-build-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  when: on_failure
  variables:
    BODY: '##### [${CI_PROJECT_NAME}] docker image のビルド / プッシュに失敗しました'
  needs:
    - staging-docker-build
  dependencies:
    - staging-docker-build
