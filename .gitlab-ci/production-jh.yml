stages:
  - build
  - deploy
  - notification

variables:
  PRODUCTION_GCLOUD_AUTH_CODE: 
  PRODUCTION_GCLOUD_PROJECT: sensy-md-joyfulhonda
  PRODUCTION_ARTIFACT_REGISTRY_REGION: asia-northeast1
  PRODUCTION_ARTIFACT_REGISTRY_REPOSITORY: ${PRODUCTION_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/sensy-md-joyfulhonda/frontend/admin
  PRODUCTION_CLOUD_RUN_SERVICE_NAME: admin

# ＣＩの共通処理を読み込み（案件グループ内の private レポジトリを参照）
include:
  - project: infrastructure-templates/gitlab-ci
    file:
      - .notification/.gitlab-ci.yml
      - .gcp/.gitlab-ci.yml

# docker build
docker-build:
  extends: .gcp-artifact-registry-build-and-push
  tags: [$BUILD_RUNNER]
  variables:
    ENVIRONMENT: production-jh
    GCLOUD_AUTH_CODE: ${PRODUCTION_GCLOUD_AUTH_CODE}
    GCLOUD_PROJECT: ${PRODUCTION_GCLOUD_PROJECT}
    REGION: ${PRODUCTION_ARTIFACT_REGISTRY_REGION}
    IMAGE_NAME: ${PRODUCTION_ARTIFACT_REGISTRY_REPOSITORY}

# ビルド通知
docker-build-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  when: on_failure
  variables:
    BODY: '##### [${CI_PROJECT_NAME}] docker image のビルド / プッシュに失敗しました'
  needs:
    - docker-build
  dependencies:
    - docker-build

# cloud run service デプロイ
cloud-run-service-deploy:
  extends: .gcp-cloud-run-service-deploy
  tags: [$BUILD_RUNNER]
  variables:
    GCLOUD_AUTH_CODE: ${PRODUCTION_GCLOUD_AUTH_CODE}
    GCLOUD_PROJECT: ${PRODUCTION_GCLOUD_PROJECT}
    REGION: ${PRODUCTION_ARTIFACT_REGISTRY_REGION}
    IMAGE_NAME: ${PRODUCTION_ARTIFACT_REGISTRY_REPOSITORY}
    CLOUD_RUN_SERVICE_NAME: ${PRODUCTION_CLOUD_RUN_SERVICE_NAME}

# デプロイ通知
cloud-run-service-deploy-notification:
  extends: .notification-send
  tags: [$BUILD_RUNNER]
  when: on_failure
  variables:
    BODY: '##### [${CI_PROJECT_NAME}] デプロイに失敗しました'
  needs:
    - cloud-run-service-deploy
  dependencies:
    - cloud-run-service-deploy
